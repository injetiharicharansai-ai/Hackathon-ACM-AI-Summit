<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password - GST Reconciliation</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --blue:#2563eb;
  --orange:#f97316;
  --shadow:0 10px 30px rgba(2,6,23,.08);
}

body{
  margin:0;
  font-family: system-ui;
  background:linear-gradient(180deg,#fff 0%,var(--bg) 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:var(--card);
  padding:28px;
  border-radius:14px;
  width:380px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}

.logo{
  width:50px;
  height:50px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--orange));
  margin:auto;
}

h1{
  text-align:center;
  margin:10px 0 4px;
}
.sub{
  text-align:center;
  font-size:13px;
  color:var(--muted);
  margin-bottom:16px;
}

.field{
  display:flex;
  flex-direction:column;
  margin-top:14px;
}
label{
  font-size:13px;
  color:var(--muted);
}
input{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:4px;
}

button{
  margin-top:18px;
  width:100%;
  padding:11px;
  border:0;
  border-radius:12px;
  background:var(--blue);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background: #1d4ed8;
}

#resetMessage{
  display:none;
  margin-top:14px;
  padding:12px;
  border-radius:8px;
  font-size:13px;
  text-align:center;
}

#resetMessage.success{
  background:#dcfce7;
  border:1px solid #86efac;
  color:#166534;
}

#resetMessage.error{
  background:#fee2e2;
  border:1px solid #fca5a5;
  color:#991b1b;
}

.links{
  text-align:center;
  margin-top:16px;
  font-size:13px;
  color:var(--muted);
}

.links a{
  color:var(--blue);
  text-decoration:none;
}

.hint{
  font-size:12px;
  color:var(--muted);
  margin-top:4px;
}
</style>
</head>

<body>

<div class="card">
<div class="logo"></div>
<h1>Reset Password</h1>
<p class="sub">Enter your reset code and new password</p>

<form id="resetForm">
<div class="field">
<label>Email / Username</label>
<input id="email" type="text" placeholder="Your email or username" readonly>
</div>

<div class="field">
<label>Reset Code</label>
<input id="code" type="text" placeholder="Enter 6-digit code from email" required>
<p class="hint">Check your email for the reset code</p>
</div>

<div class="field">
<label>New Password</label>
<input id="newPassword" type="password" placeholder="Enter new password" required>
</div>

<div class="field">
<label>Confirm Password</label>
<input id="confirmPassword" type="password" placeholder="Re-enter password" required>
</div>

<button type="submit">Reset Password</button>

<div id="resetMessage"></div>
</form>
</div>

<div class="links">
<a href="login.html">← Back to Login</a> | 
<a href="forgot-password.html">Resend Code</a>
</div>

<script>
// Get email from URL parameter
const params = new URLSearchParams(location.search);
const email = params.get('email') || '';
document.getElementById('email').value = decodeURIComponent(email);

document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const userEmail = document.getElementById('email').value.trim();
  const code = document.getElementById('code').value.trim();
  const newPassword = document.getElementById('newPassword').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  
  if (!userEmail || !code) {
    showMessage('❌ Please fill all fields', 'error');
    return;
  }
  
  if (newPassword !== confirmPassword) {
    showMessage('❌ Passwords do not match', 'error');
    return;
  }
  
  if (newPassword.length < 6) {
    showMessage('❌ Password must be at least 6 characters', 'error');
    return;
  }
  
  try {
    const response = await fetch('/api/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: userEmail, code, password: newPassword })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      showMessage('✅ Password reset successful! Redirecting to login...', 'success');
      setTimeout(() => {
        window.location.href = 'login.html';
      }, 2000);
    } else {
      showMessage('❌ ' + (data.detail || 'Reset failed. Check your code.'), 'error');
    }
  } catch (err) {
    showMessage('❌ Error: ' + err.message, 'error');
  }
});

function showMessage(msg, type) {
  const msgDiv = document.getElementById('resetMessage');
  msgDiv.textContent = msg;
  msgDiv.className = type;
  msgDiv.style.display = 'block';
}
</script>
</body>
</html>
