<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - GST Reconciliation</title>

<style>
:root{
  --bg:#f6f7fb;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --border:#e2e8f0;
  --blue:#2563eb;
  --orange:#f97316;
  --shadow:0 10px 30px rgba(2,6,23,.08);
}

body{
  margin:0;
  font-family: system-ui;
  background:linear-gradient(180deg,#fff 0%,var(--bg) 100%);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:var(--card);
  padding:28px;
  border-radius:14px;
  width:380px;
  box-shadow:var(--shadow);
  border:1px solid var(--border);
}

.logo{
  width:50px;
  height:50px;
  border-radius:12px;
  background:linear-gradient(135deg,var(--blue),var(--orange));
  margin:auto;
}

h1{
  text-align:center;
  margin:10px 0 4px;
}
.sub{
  text-align:center;
  font-size:13px;
  color:var(--muted);
  margin-bottom:20px;
}

.field{
  display:flex;
  flex-direction:column;
  margin-top:14px;
}
label{
  font-size:13px;
  color:var(--muted);
}
input{
  padding:10px;
  border-radius:10px;
  border:1px solid var(--border);
  margin-top:4px;
}

button{
  margin-top:18px;
  width:100%;
  padding:11px;
  border:0;
  border-radius:12px;
  background:var(--blue);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background: #1d4ed8;
}

.info{
  margin-top:14px;
  padding:12px;
  background:#f0f4ff;
  border-radius:8px;
  border-left:4px solid var(--blue);
  font-size:12px;
  color:var(--text);
}

.links{
  text-align:center;
  margin-top:16px;
  font-size:13px;
  color:var(--muted);
}

.links a{
  color:var(--blue);
  text-decoration:none;
}

#resetMessage{
  display:none;
  margin-top:14px;
  padding:12px;
  border-radius:8px;
  font-size:13px;
  text-align:center;
}

#resetMessage.success{
  background:#dcfce7;
  border:1px solid #86efac;
  color:#166534;
}

#resetMessage.error{
  background:#fee2e2;
  border:1px solid #fca5a5;
  color:#991b1b;
}
</style>
</head>

<body>

<div class="card">
<div class="logo"></div>
<h1>Forgot Password?</h1>
<p class="sub">Enter your login email to receive a reset code</p>

<form id="forgotForm">
<div class="field">
<label>Login Email / Username</label>
<input id="email" type="text" placeholder="Enter your email or username" required>
</div>

<button type="submit">Send Reset Code</button>

<div id="resetMessage"></div>

<div class="info">
📧 A password reset code will be sent to your email. Check your inbox and spam folder.
</div>
</div>

<div class="links">
<a href="login.html">← Back to Login</a> | 
<a href="register.html">Create Account</a>
</div>

<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const email = document.getElementById('email').value.trim();
  const msgDiv = document.getElementById('resetMessage');
  
  if (!email) {
    showMessage('Please enter your email or username', 'error');
    return;
  }
  
  try {
    const response = await fetch('/api/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    
    const data = await response.json();
    
    if (response.ok) {
      showMessage('✅ Reset code sent! Check your email. Redirecting...', 'success');
      setTimeout(() => {
        window.location.href = 'reset-password.html?email=' + encodeURIComponent(email);
      }, 2000);
    } else {
      showMessage('❌ ' + (data.detail || 'Email not found'), 'error');
    }
  } catch (err) {
    showMessage('❌ Error: ' + err.message, 'error');
  }
});

function showMessage(msg, type) {
  const msgDiv = document.getElementById('resetMessage');
  msgDiv.textContent = msg;
  msgDiv.className = type;
  msgDiv.style.display = 'block';
}
</script>
</body>
</html>
